services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "4321:4321"
    volumes:
      # Bind-mount source for hot reload, but keep container's node_modules.
      - ./:/app
      - node_modules:/app/node_modules
    environment:
      # Astro/Vite file watching over a bind mount.
      - CHOKIDAR_USEPOLLING=true
    command: npm run dev

volumes:
  node_modules:
